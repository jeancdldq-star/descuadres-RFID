<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba PDA</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            background-color: #e0f2fe; 
            color: #0f172a; 
        }
        .caja { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: inline-block;
            max-width: 90%;
        }
        h1 { color: #2563eb; margin-top: 0; }
        p { font-size: 1.1rem; color: #475569; line-height: 1.5; }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            background: #16a34a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="caja">
        <h1>✅ ¡Conexión Exitosa!</h1>
        <p>Si estás viendo esta pantalla en la PDA, significa que el dispositivo <strong>SÍ</strong> tiene permiso para acceder a GitHub Pages.</p>
        
        <button onclick="alert('¡La pantalla táctil y los botones funcionan bien!')">Toca aquí para probar</button>
    </div>
</body>
</html>
