<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de SKUs en Tiendas</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --border: #e2e8f0;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px; 
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 600px;
        }

        h2 {
            margin-top: 0;
            color: #0f172a;
            font-size: 1.5rem;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input { 
            flex: 1;
            padding: 12px 16px; 
            font-size: 16px; 
            border-radius: 8px;
            border: 1px solid var(--border); 
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button { 
            padding: 12px 24px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        button:hover { 
            background-color: var(--primary-hover); 
        }

        #resultado { 
            display: none; 
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Estilos de la tabla de resultados */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: #334155;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .mensaje-error {
            background-color: #fef2f2;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #fecaca;
            text-align: center;
        }

        .mensaje-info {
            padding: 16px;
            background-color: #f0fdf4;
            color: #166534;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        /* Para que se vea bien en móviles pequeños */
        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
            th, td {
                padding: 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Buscador de Descuadres</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 24px;">Escanea o introduce el SKU para ver en qué tiendas se encuentra.</p>
        
        <div class="input-group">
            <input type="text" id="skuInput" placeholder="Ej: 0010100150042 (sin barras)" onkeypress="if(event.key === 'Enter') buscarSKU()">
            <button onclick="buscarSKU()">Buscar</button>
        </div>

        <div id="resultado"></div>
        
        <!-- Nuevo botón para descargar el archivo modificado -->
        <div id="zonaDescarga" style="display: none; margin-top: 20px; text-align: center; border-top: 2px dashed #cbd5e1; padding-top: 20px;">
            <p style="color: #b45309; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold;">⚠️ Tienes cambios sin guardar</p>
            <button onclick="descargarTXT()" style="background-color: #d97706; width: 100%;">📥 Descargar TXT Actualizado</button>
            <p style="color: #64748b; font-size: 0.8rem; margin-top: 10px;">Sube este archivo a GitHub para guardar los cambios.</p>
        </div>
    </div>

    <script>
        // Variables globales para mantener el archivo en memoria
        let lineasTXT = [];
        let cambiosPendientes = false;

        // Cargamos el archivo nada más abrir la página, en lugar de en cada búsqueda
        window.onload = function() {
            document.getElementById('skuInput').focus();
            cargarArchivoTXT();
        };

        function cargarArchivoTXT() {
            const url = 'descuadres_html.txt?v=' + new Date().getTime();
            fetch(url)
                .then(respuesta => {
                    if (!respuesta.ok) throw new Error('Archivo no encontrado');
                    return respuesta.text();
                })
                .then(texto => {
                    // Guardamos todas las líneas en memoria
                    lineasTXT = texto.split('\n');
                })
                .catch(error => {
                    mostrarError(`<strong>Error:</strong> No se pudo cargar "descuadres_html.txt".`);
                });
        }

        function buscarSKU() {
            const inputElement = document.getElementById('skuInput');
            const skuOriginal = inputElement.value.trim().toUpperCase();
            const skuBuscadoLimpio = skuOriginal.replace(/\//g, ''); 
            const divResultado = document.getElementById('resultado');

            // Limpiamos el input para el siguiente escaneo
            inputElement.value = '';
            inputElement.focus();

            if (!skuBuscadoLimpio) {
                mostrarError('Por favor, escanea o introduce un SKU válido.');
                return;
            }

            if (lineasTXT.length === 0) {
                mostrarError('El archivo de datos aún no se ha cargado o está vacío.');
                return;
            }

            let resultadosEncontrados = [];

            // Empezamos en 1 para saltarnos la cabecera
            for (let i = 1; i < lineasTXT.length; i++) {
                const linea = lineasTXT[i].trim();
                if (!linea) continue;

                const partes = linea.split(';');
                
                if (partes.length >= 2) {
                    const skuFilaOriginal = partes[1].trim().toUpperCase();
                    const skuFilaLimpio = skuFilaOriginal.replace(/\//g, '');

                    if (skuFilaLimpio === skuBuscadoLimpio) {
                        resultadosEncontrados.push({
                            indiceOriginal: i, // Guardamos en qué línea exacta del TXT está
                            tienda: partes[0] || '-',
                            unidades: partes[2] || '0',
                            ok: partes[3] || '0', // Columna OK
                            comentario: partes[4] || '',
                            skuBonito: skuFilaOriginal
                        });
                    }
                }
            }

            if (resultadosEncontrados.length > 0) {
                mostrarTablaResultados(resultadosEncontrados[0].skuBonito, resultadosEncontrados);
            } else {
                mostrarError(`No se ha encontrado el SKU: <strong>${skuOriginal}</strong>`);
            }
        }

        function mostrarTablaResultados(sku, datos) {
            const divResultado = document.getElementById('resultado');
            divResultado.style.display = 'block';
            divResultado.style.border = '1px solid #e2e8f0';

            let totalUnidades = 0;
            
            let html = `
                <div class="mensaje-info">
                    <strong>SKU Encontrado:</strong> ${sku}
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Tienda</th>
                            <th>Uds</th>
                            <th style="text-align: center;">Estado</th>
                            <th>Comentarios</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            datos.forEach(dato => {
                totalUnidades += parseInt(dato.unidades) || 0;
                
                // Lógica del botón OK
                let botonAccion = '';
                if (dato.ok === '3') {
                    botonAccion = '<span style="color: #16a34a; font-weight: bold;">✓ Listo</span>';
                } else {
                    // Si no es 3, mostramos el botón. Le pasamos la línea exacta que debe editar
                    botonAccion = `<button onclick="marcarComoOK(${dato.indiceOriginal}, '${sku}')" style="padding: 6px 12px; font-size: 14px; background-color: #10b981; width: auto;">OK</button>`;
                }

                html += `
                    <tr>
                        <td><strong>${dato.tienda}</strong></td>
                        <td>${dato.unidades}</td>
                        <td style="text-align: center;">${botonAccion}</td>
                        <td style="font-size: 0.85rem; color: #64748b;">${dato.comentario}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                    <tfoot style="background-color: #f8fafc; font-weight: bold;">
                        <tr>
                            <td style="text-align: right;">TOTAL:</td>
                            <td>${totalUnidades}</td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            `;

            divResultado.innerHTML = html;
        }

        // Función que se ejecuta al pulsar el botón OK
        function marcarComoOK(indice, skuBuscado) {
            // 1. Buscamos la línea exacta y la separamos
            let partes = lineasTXT[indice].split(';');
            
            // Nos aseguramos de que tenga 5 columnas por si el txt vino cortado
            while(partes.length < 5) partes.push(""); 
            
            // 2. Cambiamos el valor de la columna OK (índice 3) a "3"
            partes[3] = "3"; 
            
            // 3. Volvemos a juntar la línea con los puntos y comas y la guardamos en memoria
            lineasTXT[indice] = partes.join(';'); 
            
            // 4. Mostramos el botón de descargar porque hay cambios nuevos
            document.getElementById('zonaDescarga').style.display = 'block';
            cambiosPendientes = true;

            // 5. Volvemos a lanzar la búsqueda para que la tabla se actualice visualmente (cambie OK por "✓ Listo")
            document.getElementById('skuInput').value = skuBuscado;
            buscarSKU();
        }

        // Función para descargar el archivo actualizado
        function descargarTXT() {
            // Juntamos todas las líneas de nuevo con saltos de línea
            const contenido = lineasTXT.join('\n');
            
            // Creamos un archivo virtual en el navegador
            const blob = new Blob([contenido], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            
            // Forzamos la descarga del archivo
            const a = document.createElement('a');
            a.href = url;
            a.download = 'descuadres_html.txt'; // Mismo nombre para sobreescribir fácilmente
            document.body.appendChild(a);
            a.click();
            
            // Limpiamos
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            
            // Ocultamos el aviso de descarga
            document.getElementById('zonaDescarga').style.display = 'none';
            cambiosPendientes = false;
        }

        function mostrarError(mensaje) {
            const divResultado = document.getElementById('resultado');
            divResultado.style.display = 'block';
            divResultado.style.border = 'none';
            divResultado.innerHTML = `<div class="mensaje-error">${mensaje}</div>`;
        }
    </script>
</body>
</html>
