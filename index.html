<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test IT Firewall</title>
</head>
<body style="background-color: #1e293b; color: white; font-family: sans-serif; text-align: center; padding: 50px;">

    <h2>Radar de Conexión Firestore</h2>
    <button onclick="probarConexion()" style="padding: 20px; font-size: 20px; background-color: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px;">
        📡 Lanzar Test
    </button>
    
    <h1 id="resultado" style="margin-top: 40px; font-size: 30px;">Esperando...</h1>

    <script>
        async function probarConexion() {
            document.getElementById("resultado").innerText = "Probando...";
            document.getElementById("resultado").style.color = "yellow";
            
            try {
                // Intentamos golpear el servidor base de Firestore
                await fetch('https://firestore.googleapis.com/', { mode: 'no-cors' });
                
                document.getElementById("resultado").innerText = "✅ ¡CONEXIÓN ABIERTA! IT no lo bloquea.";
                document.getElementById("resultado").style.color = "#22c55e"; // Verde
            } catch (error) {
                document.getElementById("resultado").innerText = "❌ BLOQUEADO. El firewall de IT corta la señal.";
                document.getElementById("resultado").style.color = "#ef4444"; // Rojo
            }
        }
    </script>
</body>
</html>
